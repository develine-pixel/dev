   <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devenir Rédacteur | MyBlog</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f1f5f9;
            --text: #1e293b;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
        }

        .signup-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; display: block; text-decoration: none; }

        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; color: #0f172a; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #475569; }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #4338ca; transform: translateY(-2px); }

        .info-box {
            background: #eff6ff;
            border: 1px solid #dbeafe;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #1e40af;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .footer-link { margin-top: 25px; font-size: 0.85rem; color: #64748b; }
        .footer-link a { color: var(--primary); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

    <div class="signup-card">
        <a href="home.html" class="logo">MyBlog.</a>
        <h1>Rejoignez l'équipe</h1>
        <p>Créez votre compte pour commencer à soumettre vos articles.</p>

        <div class="info-box">
            📢 <b>Note :</b> Votre compte sera en attente de validation par un administrateur avant que vous ne puissiez publier.
        </div>

        <form id="regForm">
            <div style="display: flex; gap: 10px;">
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="prenom" placeholder="Ex: Jean" required>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="nom" placeholder="Ex: Dupont" required>
                </div>
            </div>

            <div class="form-group">
                <label>Nom d'utilisateur (Pseudo)</label>
                <input type="text" id="user" placeholder="Choisissez un pseudo" required>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="pass" placeholder="••••••••" required>
            </div>

            <button type="submit">Envoyer ma demande</button>
        </form>

        <div class="footer-link">
            Déjà rédacteur ? <a href="login.html">Connectez-vous</a>
        </div>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();

            const data = {
                prenom: document.getElementById('prenom').value,
                nom: document.getElementById('nom').value,
                username: document.getElementById('user').value,
                password: document.getElementById('pass').value,
                role: 'author' // On force le rôle auteur ici
            };

            try {
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    alert("✅ Demande envoyée ! Un administrateur doit maintenant valider votre compte.");
                    window.location.href = 'login.html';
                } else {
                    alert("❌ Erreur : " + result.message);
                }
            } catch (err) {
                alert("Impossible de contacter le serveur.");
            }
        };
    </script>
</body>
</html>
