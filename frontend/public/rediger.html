   <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Rédacteur - Blog Moderne</title>
    <script>
        // SÉCURITÉ : Vérification stricte du rôle auteur
        const role = localStorage.getItem('userRole')?.toLowerCase().trim();
        // On accepte 'author' ou 'auteur' pour éviter les erreurs de traduction
        if (role !== 'author' && role !== 'auteur') {
            alert("Accès refusé : Cet espace est réservé aux auteurs approuvés.");
            window.location.replace('login.html');
        }
    </script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .container { 
            background: white; 
            width: 100%; 
            max-width: 550px; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: #1e293b; text-align: center; margin-bottom: 5px; font-weight: 800; }
        .welcome-msg { text-align: center; color: var(--primary); font-weight: 600; margin-bottom: 30px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 6px; color: #64748b; font-size: 0.85rem; font-weight: 700; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #f1f5f9; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        .nav-links { text-align: center; margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .nav-links a { color: #64748b; text-decoration: none; font-size: 0.9em; font-weight: 600; }
        .nav-links a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <h1>✍️ Rédaction</h1>
        <p id="msgAuteur" class="welcome-msg">Ravi de vous lire !</p>
        
        <form id="formArticle">
            <div class="form-grid">
                <div class="full-width">
                    <label>Titre de l'article</label>
                    <input type="text" id="titre" placeholder="Un titre accrocheur..." required>
                </div>
                
                <div>
                    <label>Catégorie</label>
                    <input type="text" id="categorie" placeholder="ex: Tech, Santé" required>
                </div>

                <div>
                    <label>Tags (séparés par virgules)</label>
                    <input type="text" id="tags" placeholder="ex: js, web, tuto">
                </div>

                <div class="full-width">
                    <label>Document ou Image de l'article</label>
                    <input type="file" id="document" accept=".pdf,.doc,.docx,image/*" required>
                </div>
            </div>

            <input type="hidden" id="author_id">
            
            <button type="submit" id="btnEnvoi">🚀 Soumettre pour validation</button>
        </form>

        <div class="nav-links">
            <a href="blog.html">🏠 Retour au blog</a> &nbsp; | &nbsp; 
            <a href="#" onclick="deconnexion()" style="color: #ef4444;">🚪 Déconnexion</a>
        </div>
    </div>

    <script>
        // Récupération dynamique des infos de session
        const prenom = localStorage.getItem('userPrenom');
        const userId = localStorage.getItem('userId');

        if (prenom) {
            document.getElementById('msgAuteur').innerText = `Ravi de vous lire, ${prenom} !`;
        }
        if (userId) {
            document.getElementById('author_id').value = userId;
        }

        function deconnexion() {
            localStorage.clear();
            window.location.replace('login.html');
        }

        document.getElementById('formArticle').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnvoi');
            
            // Sécurité visuelle
            btn.innerText = "⏳ Transmission en cours...";
            btn.disabled = true;
            
            const formData = new FormData();
            formData.append('titre', document.getElementById('titre').value);
            formData.append('author_id', document.getElementById('author_id').value);
            formData.append('categorie', document.getElementById('categorie').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('document', document.getElementById('document').files[0]);

            try {
                const res = await fetch('http://localhost:3000/api/article', {
                    method: 'POST',
                    body: formData 
                    // Rappel : Ne pas mettre de Content-Type manuel pour les fichiers (FormData s'en occupe)
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✨ Succès ! Votre article a été envoyé à l'administrateur pour validation.");
                    e.target.reset(); // Vide le formulaire
                } else {
                    alert("⚠️ Erreur : " + (data.error || "Impossible d'envoyer l'article."));
                }
            } catch (error) {
                console.error(error);
                alert("🌐 Le serveur semble hors ligne. Vérifiez votre connexion.");
            } finally {
                btn.innerText = "🚀 Soumettre pour validation";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
